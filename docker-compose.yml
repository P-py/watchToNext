services:

  postgres:
    image: postgres:16-alpine
    container_name: watchtonext-postgres
    restart: unless-stopped
    env_file:
      - ./backend/.env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: watchtonext-redis
    restart: unless-stopped
    # LRU-friendly cache for recommendation results. Eviction allowed.
    command: ["redis-server", "--maxmemory-policy", "allkeys-lru"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  auth-redis:
    image: redis:7-alpine
    container_name: watchtonext-auth-redis
    restart: unless-stopped
    # Session store. Different policy: no eviction (sessions MUST NOT be dropped under
    # memory pressure), AOF on for durability across container restarts, password auth.
    command:
      - "redis-server"
      - "--requirepass"
      - "${AUTH_REDIS_PASSWORD:-changeme}"
      - "--maxmemory-policy"
      - "noeviction"
      - "--appendonly"
      - "yes"
    env_file:
      - ./backend/.env
    ports:
      - "6380:6379"
    volumes:
      - auth_redis_data:/data
    healthcheck:
      test:
        - "CMD"
        - "redis-cli"
        - "-a"
        - "${AUTH_REDIS_PASSWORD:-changeme}"
        - "--no-auth-warning"
        - "ping"
      interval: 5s
      timeout: 5s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: watchtonext-keycloak
    restart: unless-stopped
    command: ["start-dev", "--import-realm"]
    env_file:
      - ./backend/.env
    ports:
      - "8180:8080"
      - "9000:9000"
    volumes:
      - keycloak_data:/opt/keycloak/data
      - ./infra/keycloak/realm-export.json:/opt/keycloak/data/import/watchtonext-realm.json:ro
      - ./infra/keycloak/themes:/opt/keycloak/themes:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        - "CMD-SHELL"
        - "exec 3<>/dev/tcp/127.0.0.1/9000 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '\"status\": \"UP\"'"
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

volumes:
  postgres_data:
  redis_data:
  auth_redis_data:
  keycloak_data:
