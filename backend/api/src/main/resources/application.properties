spring.application.name=api

# DataSource — override via env vars in CI / production
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/watchtonext}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:watchtonext}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:watchtonext}

# JPA — schema managed entirely by Flyway
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false

# Make unknown routes throw NoHandlerFoundException so the global advice can turn them into ApiError(404)
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Redis
spring.data.redis.url=${REDIS_URL:redis://localhost:6379}

# Response cache TTLs (tuned in config/CacheConfig.kt — listed here for reference):
#   movies-popular   = 5m   (popularity changes only via re-seed)
#   movies-detail    = 1h   (movie payload effectively immutable in runtime)
#   recommendations  = 2m   (evicted on any rating/favorite mutation)

# CORS — comma-separated list of allowed browser origins.
# Override via env: APP_CORS_ALLOWED_ORIGINS=https://app.example.com,https://staging.example.com
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000}

# Keycloak / OAuth2 resource server
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${KEYCLOAK_JWK_URI:http://localhost:8180/realms/watchtonext/protocol/openid-connect/certs}

# Recommender
recommender.favorite-boost=1.2
recommender.min-vote-count=50
