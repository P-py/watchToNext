# watchToNext login theme — CSS-only restyle of the stock Keycloak login pages.
# Keeps every parent template/asset; only appends one stylesheet on top.
parent=keycloak
import=common/keycloak

# `css/login.css` is inherited from the parent theme (child has no copy, so it
# resolves upward); `css/watchtonext.css` is our override layer, loaded last.
styles=css/login.css css/watchtonext.css
